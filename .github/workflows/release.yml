name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Build release component
        run: cargo component build --release

      - name: Prepare registry release assets
        run: |
          mkdir -p target/patina-release
          cp target/wasm32-wasip1/release/patina_ai_child_slate_manager.wasm target/patina-release/
          cp child.toml target/patina-release/child.toml
          cd target/patina-release
          sha256sum patina_ai_child_slate_manager.wasm > patina_ai_child_slate_manager.wasm.sha256
          sha256sum child.toml > child.toml.sha256
          sha256sum patina_ai_child_slate_manager.wasm child.toml > checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/patina-release/patina_ai_child_slate_manager.wasm
            target/patina-release/patina_ai_child_slate_manager.wasm.sha256
            target/patina-release/child.toml
            target/patina-release/child.toml.sha256
            target/patina-release/checksums.txt
